const DEFAULT_STATE={view:'home',place:'diani',tab:{},budgetFilter:'Alle'};
let S; try{S={...DEFAULT_STATE,...JSON.parse(localStorage.ea_v44_state||'{}')}}catch(e){S={...DEFAULT_STATE}}
function $(id){return document.getElementById(id)}
function save(){localStorage.ea_v44_state=JSON.stringify(S)}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function bg(k){return ASSETS[k]||ASSETS.beach}
function hero(title,sub,img='beach'){return `<div class="hero" style="background-image:${bg(img)}"><div class="topchips"><span>🌍 16.07.–03.08.2026</span><span>💶 3500 €</span></div><div class="kicker">East Africa Tour</div><h1>${esc(title)}</h1><p>${esc(sub)}</p><div class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></div></div>`}
function section(t,body,extra=''){return `<section class="section ${extra}">${t?`<h2>${esc(t)}</h2>`:''}${body}</section>`}
function img(k){return `<div class="img" style="background-image:${bg(k)}"></div>`}
function chips(arr){return `<div class="chips">${arr.filter(Boolean).map(x=>`<span class="tag ${String(x).match(/Nächte|Basis|Diani|Pemba|gebucht|PDF|hoch|Flüge|Transit|local|Romantik|Natur/)?'green':''}">${esc(x)}</span>`).join('')}</div>`}
function setView(v){S.view=v;save();render();requestAnimationFrame(()=>scrollTo(0,0))}
function place(id){S.view='place';S.place=id;S.tab.place=S.tab.place||'Restaurants';save();render();requestAnimationFrame(()=>scrollTo(0,0))}
function nav(){$('nav').innerHTML=PAGES.map(p=>`<button class="nav ${S.view===p[0]?'active':''}" onclick="setView('${p[0]}')"><b>${p[1]}</b>${p[2]}</button>`).join('')}
function smart(){let t=DATA.todos.find(x=>x[2]==='hoch')||DATA.todos[0];return `<section class="section" style="background-image:${bg('smart')};background-size:cover;color:white"><div class="kicker">Nächste Aufgabe · hohe Priorität</div><h2 style="color:white;letter-spacing:0;text-transform:none;font-size:1.7rem;margin:4px 0">${esc(t[0])}</h2><p>${esc(t[4])}</p><button class="btn ghost" onclick="setView('todos')">Status ändern →</button></section>`}
function topActs(){return section('Top Ausflüge',`<div class="between"><p class="muted">antippen für Ablauf, Preis und Alternativen</p><button class="btn" onclick="setView('activities')">Alle Ausflüge</button></div><div class="scroll">${DATA.activities.map((a,i)=>`<div class="card click" onclick="actDetail(${i})">${img(a[5])}<div class="cardbody"><h3>${esc(a[0])}</h3><p class="muted">${esc(a[1])} · ${esc(a[2])}</p>${chips([a[3]])}</div></div>`).join('')}</div>`)}

function todos(){let high=DATA.todos.filter(t=>t[2]==='hoch').length;return hero('To-Dos','Priorität, Kategorie, Kalender und Budget-Logik','safari')+section('',`<div class="stats"><div class="stat"><b>${DATA.todos.length}</b>Offen</div><div class="stat"><b>${high}</b>Hohe Prio</div><div class="stat"><b>0</b>Erledigt</div></div>`)+section('Filter',`<div class="filters"><input placeholder="Suche: Mercy, Fähre, Visa, Unterkunft..."><label class="lbl">Status<select><option>Alle</option><option>offen</option><option>in Arbeit</option><option>erledigt</option></select></label><label class="lbl">Priorität<select><option>Alle</option><option>hoch</option><option>mittel</option></select></label><label class="lbl">Kategorie<select><option>Alle</option><option>Dokumente & Visa</option><option>Transport & Flüge</option></select></label></div>`)+section('Neue Aufgabe eintragen',`<details class="collap"><summary>Aufgabe hinzufügen</summary><div class="inline-form"><input placeholder="Titel"><input placeholder="Datum"><button class="btn primary">Speichern</button></div></details>`)+section(`${DATA.todos.length} Aufgaben im aktuellen Filter`,DATA.todos.map((t,i)=>`<div class="card" style="margin-bottom:12px"><div class="cardbody"><h3>${esc(t[0])}</h3>${chips([t[1],'Prio '+t[2],t[3]])}<p class="muted">${esc(t[4])}</p><details class="collap"><summary>Status, Prio, Kategorie, Kosten</summary><div><div class="grid2"><select><option>offen</option><option>in Arbeit</option><option>erledigt</option></select><select><option>${esc(t[2])}</option><option>mittel</option></select></div><button class="btn">Kalender</button><button class="btn">Entfernen</button></div></details></div></div>`).join(''))}
function pack(){let groups=Object.entries(DATA.pack);return hero('Packliste','kompakt filtern · abhaken · lokal gespeichert','sail')+section('',`<div class="stats"><div class="stat"><b>0</b>gepackt</div><div class="stat"><b>40</b>offen</div><div class="stat"><b>40</b>gesamt</div></div><div class="filters" style="margin-top:12px"><input placeholder="Suche: Reisepass, Mückenschutz, Powerbank..."><label class="lbl">Besitzer<select><option>Alle</option><option>Waldemar</option><option>Mercy</option><option>Gemeinsam</option></select></label><label class="lbl">Status<select><option>Alle</option><option>Offen</option><option>Gepackt</option></select></label><label class="lbl">Kategorie<select><option>Alle</option>${groups.map(g=>`<option>${esc(g[0])}</option>`).join('')}</select></label></div>`)+section('Packpunkt ergänzen',`<details class="collap"><summary>Neuer Packpunkt</summary><div class="inline-form"><input placeholder="z.B. Mercy Sandale"><select><option>Dokumente</option><option>Gesundheit</option></select><button class="btn primary">Hinzufügen</button></div></details>`)+section('Packpunkte',groups.map(([cat,arr])=>`<div class="card" style="margin-bottom:12px"><div class="cardbody"><h3>${esc(cat)}</h3>${arr.map(it=>`<div class="listline"><label><input type="checkbox"> <b>${esc(it)}</b></label><button class="btn ghost">Entfernen</button></div>`).join('')}</div></div>`).join(''))}
function transport(){return hero('Transport','Klare Gruppen: Kurzstrecken, Bus, Fähren und Flüge','sail')+section('Transport filtern',`<input placeholder="Suche: Fähre, Flug, Tanga, Pemba, Taxi..."><div class="scroll">${['Alle','Taxi & Kurzstrecken','Bus & Dala Dala','Fähren','Flüge'].map(x=>`<button class="chip ${x==='Alle'?'active':''}">${x}</button>`).join('')}</div>`)+section(`${DATA.transport.length} Transport-Optionen`,DATA.transport.map((t,i)=>`<div class="card" style="margin-bottom:12px"><div class="cardbody"><h3>${esc(t[0])}</h3>${chips([t[1],t[2]])}<p class="muted">${esc(t[3])}</p><div class="row"><button class="btn" onclick="detail('${esc(t[0])}','${esc(t[3])}')">Details</button><button class="btn" onclick="maps('${esc(t[0])}')">Maps</button><button class="btn" onclick="searchWeb('${esc(t[0])}')">Anbieter</button></div></div></div>`).join(''))}
function infos(){let items=[['ETA Kenia','30 USD','https://www.etakenya.go.ke','Offizielle ETA-Seite nutzen, PDF speichern.'],['Tanzania Visa','50 USD','https://visa.immigration.go.tz','Für Grenzübertritt Lunga Lunga vorbereiten.'],['Zanzibar Insurance','44 USD p.P.','https://visitzanzibar.go.tz','QR/PDF für beide speichern.'],['Gelbfieber Mercy','2.000–5.000 KES','https://www.google.com/search?q=yellow+fever+vaccination+Nairobi','Vor Tansania klären.'],['Pemba → Zanzibar Fähre','55–95 € p.P.','https://www.google.com/search?q=Pemba+Zanzibar+ferry','Wetter/Seegang prüfen.']];return hero('Info & SOS','Preise, Links, Anbieter und Notfalltipps','police')+section('Direktinfos',items.map((x,i)=>`<div class="card" style="margin-bottom:12px"><div class="cardbody"><h3>${esc(x[0])}</h3>${chips([x[1]])}<p class="muted">${esc(x[3])}</p><div class="row"><button class="btn" onclick="detail('${esc(x[0])}','${esc(x[3])}')">Details</button><button class="btn primary" onclick="openUrl('${x[2]}')">Direktlink</button></div></div></div>`).join(''))}
function tools(){detail('Währungsrechner','1 € = 150 KES · 1 € = 2700 TZS · 1 € = 0,87 USD<br><input id="eur" type="number" placeholder="EUR" oninput="calcFx(this.value)"><p id="fx"></p>')}
function calcFx(v){let n=Number(v||0);let el=$('fx');if(el)el.innerHTML=`KES: ${Math.round(n*150)} · TZS: ${Math.round(n*2700)} · USD: ${(n*.87).toFixed(2)}`}
function detail(t,body){$('sheet').innerHTML=`<h2>${t}</h2><p>${body}</p><button class="btn primary" onclick="closeModal()">Schließen</button>`;$('modal').classList.add('show')}
function actDetail(i){let a=DATA.activities[i];detail(esc(a[0]),`${esc(a[4])}<br><br><b>Preis:</b> ${esc(a[1])} · <b>Ort:</b> ${esc(a[2])}`)}
function bookingDetail(i){let b=DATA.bookings[i];detail(esc(b[1]),`${esc(b[5])}<br><br><b>Datum:</b> ${esc(b[2])} · <b>Kosten:</b> ${esc(b[3])} · <b>Status:</b> ${esc(b[4])}`)}
function docOpen(i){let d=DATA.docs[i];detail(esc(d[0]),`${esc(d[3])}<br><br>Status: ${esc(d[2])}`)}
function closeModal(){$('modal').classList.remove('show')}
function openUrl(u){window.open(u,'_blank')}function maps(q){openUrl('https://www.google.com/maps/search/'+encodeURIComponent(q))}function searchWeb(q){openUrl('https://www.google.com/search?q='+encodeURIComponent(q))}
function render(){nav();let views={home,route,place:placePage,activities,budget:budgetPage,bookings,docs,todos,pack,transport,infos};try{$('app').innerHTML=(views[S.view]||home)()}catch(e){console.error(e);$('app').innerHTML=section(`${esc(S.view)} konnte nicht geladen werden`,`<p>${esc(e.message)}</p><button class="btn primary" onclick="setView('home')">Home</button><button class="btn" onclick="setView('route')">Route</button>`);}}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
render();
</script></body></html>
